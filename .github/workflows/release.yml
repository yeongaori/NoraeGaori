name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  LLVM_MINGW_VERSION: "20250114"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, cc: gcc,                     name: linux-x64    }
          - { goos: linux,   goarch: "386", cc: gcc,                     name: linux-x86    }
          - { goos: linux,   goarch: arm64, cc: aarch64-linux-gnu-gcc,   name: linux-arm64  }
          - { goos: windows, goarch: amd64, cc: x86_64-w64-mingw32-gcc,  name: windows-x64  }
          - { goos: windows, goarch: "386", cc: i686-w64-mingw32-gcc,    name: windows-x86  }
          - { goos: windows, goarch: arm64, cc: aarch64-w64-mingw32-gcc, name: windows-arm64 }

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Set version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi

      - name: Install cross-compiler
        run: |
          sudo apt-get update -q
          case "${{ matrix.goos }}-${{ matrix.goarch }}" in
            linux-386)
              sudo apt-get install -y gcc-multilib
              ;;
            linux-arm64)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
            windows-amd64|windows-386)
              sudo apt-get install -y mingw-w64
              ;;
            windows-arm64)
              wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-20.04-x86_64.tar.xz"
              tar xf llvm-mingw-*.tar.xz
              echo "${PWD}/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-20.04-x86_64/bin" >> $GITHUB_PATH
              ;;
          esac

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          BINARY="noraegaori"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="noraegaori.exe"
          fi
          go build -ldflags="-s -w" -o "$BINARY" ./cmd/bot

      - name: Package
        run: |
          BINARY="noraegaori"
          EXT="tar.gz"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="noraegaori.exe"
            EXT="zip"
          fi

          DIR="noraegaori-${VERSION}-${{ matrix.name }}"
          mkdir -p "$DIR/config" "$DIR/locales"

          cp "$BINARY" "$DIR/"
          cp locales/*.json "$DIR/locales/"
          cp config/*.example.json "$DIR/config/"
          cp .env.example "$DIR/"
          cp README.md LICENSE "$DIR/"

          if [ "$EXT" = "zip" ]; then
            zip -rq "${DIR}.zip" "$DIR"
          else
            tar czf "${DIR}.tar.gz" "$DIR"
          fi

          # Generate checksum
          sha256sum "${DIR}.${EXT}" > "${DIR}.${EXT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            noraegaori-*-${{ matrix.name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          artifacts: "artifacts/*.tar.gz,artifacts/*.zip,artifacts/*.sha256"
